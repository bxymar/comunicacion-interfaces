<!-- La etiqueta article para representar el producto -->
<article>

    <!-- El signo de ?, ayuda en caso de que la propiedad (nombre) tenga un valor indefinido (valor no definido) (undefined) -->
    <h2>{{productoRecibido()?.nombre}}</h2>
    <p>{{productoRecibido()?.stock}}</p>
    <p>{{productoRecibido()?.fecha_vencimiento}}</p>
    <p>{{productoRecibido()?.numeroLote}}</p>
    <p>{{productoRecibido()?.codigoBarra}}</p>
    <p>{{productoRecibido()?.estado}}</p>

</article>
